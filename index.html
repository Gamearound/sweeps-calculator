<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prize Distribution Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>Prize Calculator</h1>
        <div class="subtitle">Tournament Distribution Manager</div>
    </header>

    <div class="error-msg" id="errorBox"></div>

    <!-- Financial Inputs -->
    <div class="form-row">
        <div class="form-group">
            <label for="totalPrize">Total Prize Pool (£)</label>
            <input id="totalPrize" type="number" min="0" step="0.01" placeholder="e.g. 1000">
        </div>
        <div class="form-group">
            <label for="totalPlayers">Current Players</label>
            <input id="totalPlayers" type="number" min="1" placeholder="e.g. 15">
        </div>
    </div>

    <!-- Dynamic Ruleset Tabs -->
    <div class="tabs-container">
        <div class="tabs-header" id="tabsHeader">
            <!-- Tabs injected by JS -->
        </div>

        <div class="tab-content" id="tabContent">
            <div class="section-title">Bracket Range</div>
            <div class="form-row">
                <div class="form-group">
                    <label>Min Players</label>
                    <input id="bracketMin" type="number" min="0" class="tab-input">
                </div>
                <div class="form-group">
                    <label>Max Players (Blank for Unlimited)</label>
                    <input id="bracketMax" type="number" min="1" class="tab-input" placeholder="100+">
                </div>
            </div>

            <div class="section-title">Tier Structure</div>
            <div class="form-row">
                <div class="form-group">
                    <label>Total Winners</label>
                    <div class="input-group combined">
                        <input id="winnersVal" type="number" min="1" class="tab-input">
                        <select id="winnerMode" class="tab-input">
                            <option value="fixed">Fixed #</option>
                            <option value="percent">% Players</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="tierCount">Active Tiers</label>
                    <select id="tierCount" class="tab-input">
                        <option value="1">1 (Gold)</option>
                        <option value="2">2 (Gold, Silver)</option>
                        <option value="3">3 (Gold, Silver, Bronze)</option>
                        <option value="4">4 (Platinum, Gold, Silver, Bronze)</option>
                        <option value="5">5 (Diamond, Platinum, Gold, Silver, Bronze)</option>
                    </select>
                </div>
            </div>

            <div class="section-title">Distribution Logic</div>
            <div class="config-block">
                <div class="strategy-row">
                    <div class="input-group split-group">
                        <span class="prefix">Money</span>
                        <select id="prizeDistStyle" class="tab-input">
                            <option value="multiplier">Multiplier</option>
                            <option value="linear">Linear</option>
                        </select>
                        <input id="prizeDistMult" type="number" step="0.1" class="tab-input">
                    </div>
                </div>

                <div class="strategy-row">
                    <div class="input-group split-group">
                        <span class="prefix">Players</span>
                        <select id="playerDistStyle" class="tab-input">
                            <option value="multiplier">Multiplier</option>
                            <option value="linear">Linear</option>
                        </select>
                        <input id="playerDistMult" type="number" step="0.1" class="tab-input">
                    </div>
                </div>

                <div class="helper-text" id="strategyHelp"></div>
            </div>
        </div>
    </div>

    <button id="calcBtn" class="btn-primary">Calculate Distribution</button>

    <!-- Results Area -->
    <div id="result-area">
        <div class="summary-box">
            <div class="summary-label">Total Prize Pool</div>
            <div class="summary-val" id="res-total">£0.00</div>
            <div class="summary-sub" id="res-sub">0 Winners / 0 Players</div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th width="35%">Tier</th>
                    <th class="text-right">Count</th>
                    <th class="text-right">Prize Each</th>
                    <th class="text-right">Total</th>
                </tr>
                </thead>
                <tbody id="res-table-body"></tbody>
            </table>
        </div>

        <button id="copyBtn" class="btn-secondary">Copy Summary to Clipboard</button>
    </div>
</div>

<script src="calculator.js" defer></script>
<script src="ui.js" defer></script>
</body>
</html>
